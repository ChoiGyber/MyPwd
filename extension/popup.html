<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      min-height: 200px;
      background: #1e1e2e;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
    }
    .header {
      padding: 16px;
      background: #2a2a3e;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #363650;
    }
    .header .logo { font-size: 20px; }
    .header .title { font-weight: 600; font-size: 16px; }
    .status {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      border-bottom: 1px solid #2a2a3e;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .status-dot.connected { background: #22c55e; }
    .status-dot.locked { background: #f59e0b; }
    .status-dot.disconnected { background: #ef4444; }
    .credentials-list {
      max-height: 300px;
      overflow-y: auto;
    }
    .credential-item {
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid #2a2a3e;
    }
    .credential-item:hover { background: #2a2a3e; }
    .credential-title { font-weight: 500; margin-bottom: 2px; }
    .credential-username { font-size: 12px; color: #94a3b8; }
    .empty-state {
      padding: 32px 16px;
      text-align: center;
      color: #94a3b8;
    }
    .empty-state .icon { font-size: 32px; margin-bottom: 8px; }
    .footer {
      padding: 12px 16px;
      border-top: 1px solid #363650;
      text-align: center;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">&#x1F510;</span>
    <span class="title">MyPwd</span>
  </div>
  <div class="status" id="status">
    <span class="status-dot disconnected" id="status-dot"></span>
    <span id="status-text">Checking...</span>
  </div>
  <div class="credentials-list" id="credentials-list">
    <div class="empty-state">
      <div class="icon">&#x1F511;</div>
      <div>Checking for saved credentials...</div>
    </div>
  </div>
  <div class="footer">
    MyPwd Password Manager
  </div>
  <script src="popup.js"></script>
</body>
</html>
